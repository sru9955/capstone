<div class="page-header fade-in">
  <div>
    <h1 class="page-title text-white">My Schedule</h1>
    <p class="page-subtitle text-muted-light">View your patients and appointment details.</p>
  </div>
</div>

<div class="card p-4 mb-4 dark-glass fade-in" style="animation-delay: 0.1s;">
  <form [formGroup]="dateForm" (ngSubmit)="filterResults()" class="grid-3 items-end">
    <div class="form-group mb-0">
      <label class="form-label text-sm font-semibold text-light">Start Date</label>
      <input type="date" formControlName="startDate" class="form-control dark-input">
    </div>
    
    <div class="form-group mb-0">
      <label class="form-label text-sm font-semibold text-light">End Date</label>
      <input type="date" formControlName="endDate" class="form-control dark-input">
    </div>
    
    <div class="flex gap-2">
      <button type="submit" class="btn btn-primary flex-1 shadow-hover" [disabled]="isLoading">
        <span *ngIf="!isLoading">Filter Dates</span>
        <span *ngIf="isLoading" class="btn-spinner"></span>
      </button>
      <button type="button" class="btn btn-outline dark-outline" (click)="resetFilter()">Clear</button>
    </div>
  </form>
</div>

<div class="card dark-glass fade-in" style="animation-delay: 0.1s">
  <div class="table-container">
    <table class="dark-table" *ngIf="appointments.length > 0; else noData">
      <thead>
        <tr>
          <th>Date & Time</th>
          <th>Patient Name</th>
          <th>Status</th>
          <th>Notes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let apt of appointments">
          <td class="text-light font-medium">{{apt.appointmentTime | date:'medium'}}</td>
          <td class="text-light">{{apt.patient.name}}</td>
          <td>
            <span class="badge" 
                  [ngClass]="{
                    'badge-success': apt.status === 'COMPLETED',
                    'badge-warning': apt.status === 'SCHEDULED' || apt.status === 'RESCHEDULED',
                    'badge-danger': apt.status === 'CANCELLED'
                  }">
              {{apt.status}}
            </span>
          </td>
          <td class="notes-cell text-muted-light" [title]="apt.notes">{{apt.notes || '-'}}</td>
          <td>
            <div class="action-buttons">
              <button class="btn-action btn-complete" (click)="updateStatus(apt.id, 'COMPLETED')" *ngIf="apt.status !== 'COMPLETED'">
                Complete
              </button>
              <button class="btn-action btn-history" (click)="viewHistory(apt.patient.id)">
                History
              </button>
              <button class="btn-action btn-record" (click)="addMedicalRecord(apt)" *ngIf="apt.status === 'COMPLETED'">
                Add Record
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    
    <ng-template #noData>
      <div class="text-center py-12 text-muted-light">
        <div class="flex justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.5;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </div>
        <p class="text-lg font-medium text-light">You have no appointments scheduled.</p>
        <p class="text-sm mt-1">Try adjusting your date filters.</p>
      </div>
    </ng-template>
  </div>
</div>
