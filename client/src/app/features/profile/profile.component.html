<div class="dashboard-wrapper">
  <div class="header-banner">
    <div class="container">
      <h1>My Profile</h1>
      <p>Manage your account settings and personal information.</p>
    </div>
  </div>

  <div class="container content" *ngIf="!isLoading">
    <div class="profile-grid">
      <div class="card profile-sidebar text-center">
        
        <div class="avatar-container">
          <img *ngIf="imagePreview || profileData?.profileImageUrl; else defaultAvatar" 
               [src]="imagePreview || profileData?.profileImageUrl" 
               alt="Profile" class="profile-img">
               
          <ng-template #defaultAvatar>
            <div class="profile-img placeholder shadow-md">
              <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
          </ng-template>
          
          <label class="btn-change-pic mt-3" [class.is-uploading]="isUploading">
            <input type="file" (change)="onImageUpload($event)" accept="image/*" hidden>
            <span *ngIf="isUploading" class="btn-spinner"></span>
            {{ isUploading ? 'Uploading...' : 'Change Picture' }}
          </label>
        </div>

        <h3 class="mt-4 mb-2 profile-name">{{ profileData?.name || profileData?.username }}</h3>
        <span class="role-badge">{{ role | titlecase }}</span>
      </div>

      <div class="card profile-main">
        <h3 class="border-bottom pb-3 mb-4 section-heading">Personal Information</h3>
        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
          
          <div class="form-row">
            <div class="form-group flex-1">
              <label>Full Name</label>
              <input type="text" class="form-control" formControlName="name">
            </div>
            <div class="form-group flex-1">
              <label>Email Address</label>
              <input type="email" class="form-control" formControlName="email">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group flex-1">
              <label>Phone Number</label>
              <input type="text" class="form-control" formControlName="phone">
            </div>
          </div>

          <ng-container *ngIf="role === 'DOCTOR'">
            <h3 class="border-bottom pb-3 mb-4 mt-5 section-heading">Professional Details</h3>
            <div class="form-row">
              <div class="form-group flex-1">
                <label>Specialty</label>
                <input type="text" class="form-control" formControlName="specialty">
              </div>
              <div class="form-group flex-1">
                <label>Consultation Fee ($)</label>
                <input type="number" class="form-control" formControlName="consultationFee">
              </div>
            </div>
          </ng-container>

          <ng-container *ngIf="role === 'PATIENT'">
            <h3 class="border-bottom pb-3 mb-4 mt-5 section-heading">Patient Details</h3>
            <div class="form-row">
              <div class="form-group flex-1">
                <label>Age</label>
                <input type="number" class="form-control" formControlName="age">
              </div>
              <div class="form-group flex-1">
                <label>Address</label>
                <input type="text" class="form-control" formControlName="address">
              </div>
            </div>
          </ng-container>

          <div class="form-actions mt-5 border-top pt-4 text-right">
            <button type="submit" class="btn btn-primary lg shadow-hover" [disabled]="profileForm.invalid || isSaving">
              <span *ngIf="isSaving" class="btn-spinner"></span>
              {{ isSaving ? 'Saving Changes...' : 'Save Changes' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
