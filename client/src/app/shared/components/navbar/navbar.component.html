<nav class="navbar">
  <div class="navbar-left">
    <div class="navbar-brand">
      <span class="brand-sub">Health</span><span class="brand-title">Care</span>
    </div>
    
    <div class="navbar-links">
      <a *ngFor="let link of navLinks"
         [routerLink]="link.route"
         class="nav-link"
         [class.active]="isActive(link.route)">
        {{ link.label }}
      </a>
    </div>
  </div>

  <div class="navbar-right">
    <!-- Notification Bell -->
    <div class="notif-wrapper" (click)="toggleNotifications(); $event.stopPropagation()">
      <button class="icon-btn" [class.has-notifications]="unreadCount > 0">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-bell"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <span class="badge-count" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </button>

      <!-- Dropdown -->
      <div class="notif-dropdown" *ngIf="showNotifications" (click)="$event.stopPropagation()">
        <div class="notif-header">
          <span>Notifications</span>
          <button class="btn btn-sm btn-text" (click)="markAllRead()">Mark all read</button>
        </div>
        <div class="notif-list">
          <div *ngIf="notifications.length === 0" class="notif-empty">No notifications yet</div>
          <div *ngFor="let n of notifications"
               class="notif-item" [class.unread]="!n.isRead"
               (click)="markRead(n.id)">
            <div class="notif-dot" *ngIf="!n.isRead"></div>
            <div class="notif-content">
              <p class="notif-message">{{ n.message }}</p>
              <span class="notif-time">{{ getTimeAgo(n.timestamp) }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- User Profile Dropdown -->
    <div class="user-dropdown-wrapper" (click)="toggleProfileMenu(); $event.stopPropagation()">
      <div class="user-chip">
        <div class="avatar">{{ currentUser?.username?.charAt(0)?.toUpperCase() }}</div>
        <div class="user-info">
          <span class="user-name">{{ currentUser?.username }}</span>
          <span class="user-role">{{ currentUser?.role | titlecase }}</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-down"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>

      <div class="profile-dropdown" *ngIf="showProfileMenu" (click)="$event.stopPropagation()">
        <button class="dropdown-item" (click)="viewProfile()">Profile Settings</button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item text-danger" (click)="logout()">Logout</button>
      </div>
    </div>
  </div>
</nav>
